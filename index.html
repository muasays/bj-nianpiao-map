    const AMAP_KEY = 'edc7ab98fc99a8848ba7e5898cb02f43';

    // 北京出租车费率粗估：起步13元/3km，超出约2.3元/km（不含夜间/低速附加）
    function estimateTaxiFare(distMeters) {
        const km = distMeters / 1000;
        if (km <= 3) return 13;
        return Math.round((13 + Math.ceil(km - 3) * 2.3) * 10) / 10;
    }
    function jsonp(url, timeout = 12000) {
        return new Promise((resolve, reject) => {
            const cbid = '_amapcb_' + Math.random().toString(36).slice(2);
            const sep = url.includes('?') ? '&' : '?';
            const s = document.createElement('script');
            const timer = setTimeout(() => { cleanup(); reject(new Error('请求超时')); }, timeout);
            function cleanup() { clearTimeout(timer); delete window[cbid]; if (s.parentNode) s.parentNode.removeChild(s); }
            window[cbid] = (data) => { cleanup(); resolve(data); };
            s.onerror = () => { cleanup(); reject(new Error('网络错误')); };
            s.src = url + sep + 'callback=' + cbid;
            document.head.appendChild(s);

    function outOfChina(lng, lat) { return !(lng > 73.66 && lng < 135.05 && lat > 3.86 && lat < 53.55); }
    function transformlat(lng, lat) {

        r += (20*Math.sin(lat*Math.PI) + 40*Math.sin(lat/3*Math.PI)) * 2/3;
        r += (160*Math.sin(lat/12*Math.PI) + 320*Math.sin(lat*Math.PI/30)) * 2/3;
        return r;
    }
    function transformlng(lng, lat) {
        let r = 300 + lng + 2*lat + 0.1*lng*lng + 0.1*lng*lat + 0.1*Math.sqrt(Math.abs(lng));
        r += (20*Math.sin(6*lng*Math.PI) + 20*Math.sin(2*lng*Math.PI)) * 2/3;
        r += (20*Math.sin(lng*Math.PI) + 40*Math.sin(lng/3*Math.PI)) * 2/3;

    let userPos = null;            // {lat, lng, label}
    const activeFilters = { regionTop: 'all', region: 'all', level: 'all', price: 'all', indoor: 'all', category: 'all', search: '' };
    // 区域两级：北京（区名均以「区」结尾）+ 其他（天津、河北各市）
    const isBeijingRegion = r => String(r).endsWith('区');
    const ALL_REGIONS = [...new Set(spots.map(s => s.region))].sort();
    const OTHER_REGIONS = ALL_REGIONS.filter(r => !isBeijingRegion(r));

    // ===== 工具函数 =====
    function getRegionCategory(region) {
        const urban = ['东城区','西城区','朝阳区','海淀区','丰台区','石景山区'];
        if (urban.includes(region)) return 'urban';
        const suburban = ['昌平区','顺义区','延庆区','密云区','怀柔区','房山区','门头沟区','平谷区','大兴区','通州区'];
        if (suburban.includes(region)) return 'suburban';
        if (region === '天津') return 'tianjin';
        return 'hebei';
    }
    function getMarkerColor(c) {
        return ({ urban:'#e74c3c', suburban:'#e67e22', hebei:'#3498db', tianjin:'#9b59b6' })[c] || '#95a5a6';
    }
    function getSpotEmoji(name) {
        if (/滑雪|冰雪/.test(name)) return '🎿';
        if (/温泉|汤泉/.test(name)) return '♨️';
        if (/博物馆|故居|文化园|非遗|书院|图书馆|美术馆|科技馆/.test(name)) return '🏛️';
        if (/乐园|游乐场|蹦床|探险|亲子|网绳/.test(name)) return '🎠';
        if (/长城|陵|寺|庙|古|遗址/.test(name)) return '🏯';
        if (/山|谷|峡|湖|河|森林|公园|生态/.test(name)) return '🏔️';
        return '📍';
    }
    // 分类 emoji / 标签（来自单一数据源 SPOTS_CATEGORIES）
    const CAT_EMOJI = {}, CAT_LABEL = {};
    (window.SPOTS_CATEGORIES || []).forEach(c => { CAT_EMOJI[c.key] = c.emoji; CAT_LABEL[c.key] = c.label; });
    function catEmoji(spot) { return CAT_EMOJI[spot.category] || '📍'; }
    function catLabel(spot) { return CAT_LABEL[spot.category] || '其他'; }
    function haversine(lat1, lng1, lat2, lng2) {
        const R = 6371, r1 = lat1*Math.PI/180, r2 = lat2*Math.PI/180;
        const dphi = (lat2-lat1)*Math.PI/180, dl = (lng2-lng1)*Math.PI/180;
        const a = Math.sin(dphi/2)**2 + Math.cos(r1)*Math.cos(r2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function distTo(spot) {
        if (!userPos || !spot.lat || !spot.lng) return null;
        return haversine(userPos.lat, userPos.lng, spot.lat, spot.lng);
    }

    // ===== 标记构建 =====
    function createMarker(spot) {
        const category = getRegionCategory(spot.region);
        const color = getMarkerColor(category);
        const emoji = catEmoji(spot);
        const icon = L.divIcon({
            className: '', html: `<div class="custom-marker" style="background:${color}">${emoji}</div>`,
            iconSize: [26, 26], iconAnchor: [13, 13], popupAnchor: [0, -13]
        });
        const m = L.marker([spot.lat, spot.lng], { icon }).bindPopup(buildPopup(spot), { maxWidth: 300 });
        m.spotData = spot;
        return m;
    }

    // ===== 过滤 + 渲染 =====
    function matchFilters(spot) {
        const f = activeFilters;
        // 一级：北京 / 其他
        if (f.regionTop !== 'all') {
            const isBJ = isBeijingRegion(spot.region);
            if (f.regionTop === 'beijing' && !isBJ) return false;
            if (f.regionTop === 'other' && isBJ) return false;
        }
        // 二级：具体区 / 市
        if (f.region !== 'all' && spot.region !== f.region) return false;
        if (f.level !== 'all') {
            const lvl = (spot.note||'').trim();
            if (f.level === 'none') { if (['5A','4A','3A','2A'].includes(lvl)) return false; }
            else if (lvl !== f.level) return false;
        }
        if (f.price !== 'all') {
            const p = spot.price || '';
            if (f.price==='unlimited' && !/不限次/.test(p)) return false;
            if (f.price==='free1' && !/免1次/.test(p)) return false;
            if (f.price==='free2' && !/免2次/.test(p)) return false;
            if (f.price==='free3' && !/免3次/.test(p)) return false;
        }
        if (f.indoor !== 'all') {
            // 室内 = indoor+mixed；室外 = outdoor+mixed
            if (f.indoor==='indoor' && !['indoor','mixed'].includes(spot.indoor)) return false;
            if (f.indoor==='outdoor' && !['outdoor','mixed'].includes(spot.indoor)) return false;
        }
        if (f.category !== 'all' && spot.category !== f.category) return false;
        if (f.search) {
            const q = f.search.toLowerCase();
            const hay = [spot.name, spot.region, spot.address, spot.free_policy, spot.price].join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    }

    function applyFilters() {
        let visible = 0;
        const visibleSpots = [];
        markers.forEach(m => {
            const spot = m.spotData;
            if (matchFilters(spot)) {
                if (cluster) { if (!cluster.hasLayer(m)) cluster.addLayer(m); }
                else if (!map.hasLayer(m)) m.addTo(map);
                visible++; visibleSpots.push(spot);
            } else {
                if (cluster) { if (cluster.hasLayer(m)) cluster.removeLayer(m); }
                else if (map.hasLayer(m)) map.removeLayer(m);
            }
        });
        document.getElementById('stats').textContent = `显示 ${visible} / ${spots.length} 个景点`;
        renderList(visibleSpots);
    }

    function renderList(list) {
        const ul = document.getElementById('result-list');
        ul.innerHTML = '';
        // 定位后按距离升序
        if (userPos) list = list.slice().sort((a,b) => (distTo(a)??1e9) - (distTo(b)??1e9));
        list.forEach(spot => {
            const li = document.createElement('li');
            const lvl = (spot.note||'').trim();
            let lvlBadge = '';
            if (['5A','4A','3A','2A'].includes(lvl)) lvlBadge = `<span class="badge badge-${lvl.toLowerCase()}">${lvl}</span>`;
            const inBadge = spot.indoor==='indoor' ? '<span class="badge badge-in">室内</span>'
                         : spot.indoor==='outdoor' ? '<span class="badge badge-out">室外</span>' : '';
            const catBadge = `<span class="badge badge-cat">${catEmoji(spot)} ${catLabel(spot)}</span>`;
            const d = distTo(spot);
            const dist = d != null ? `<span class="r-dist">${d.toFixed(1)}km</span>` : '';
            li.innerHTML = `<div class="r-name">${catEmoji(spot)} ${spot.name}</div>
                <div class="r-meta">${dist} ${lvlBadge} ${inBadge} ${catBadge} <span>${spot.region}</span></div>`;
            li.onclick = () => {
                map.flyTo([spot.lat, spot.lng], 13, { duration: 0.6 });
                markers.forEach(m => { if (m.spotData === spot) setTimeout(() => m.openPopup(), 650); });
            };
            ul.appendChild(li);
        });
    }

    // ===== 定位 =====
    function locateMe() {
        if (!navigator.geolocation) { alert('当前浏览器不支持定位，请用「观林园」预设。'); return; }
        navigator.geolocation.getCurrentPosition(
            pos => setUserPos(pos.coords.latitude, pos.coords.longitude, '我的位置'),
            err => alert('定位失败（' + err.message + '），可改用「观林园」预设。')
        );
    }
    function setPreset(lat, lng, label) { setUserPos(lat, lng, label); }
    function setUserPos(lat, lng, label) {
        userPos = { lat, lng, label };
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([lat, lng], { radius: 8, color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: .9, weight: 3 })
            .addTo(map).bindPopup(`📍 ${label}`).openPopup();
        map.flyTo([lat, lng], 11, { duration: 0.6 });
        // 刷新弹出框距离 & 列表排序
        markers.forEach(m => m.setPopupContent(buildPopup(m.spotData)));
        applyFilters();
    }
    function clearLocation() {
        userPos = null;
        if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
        markers.forEach(m => m.setPopupContent(buildPopup(m.spotData)));
        applyFilters();
    }
    // 重建弹出框（用于定位后更新距离）
    function buildPopup(spot) {
        const category = getRegionCategory(spot.region);
        const color = getMarkerColor(category);
        const emoji = getSpotEmoji(spot.name);
        const lvl = (spot.note||'').trim();
        let badge = '';
        if (['5A','4A','3A','2A'].includes(lvl)) badge = `<span class="popup-badge badge-${lvl.toLowerCase()}">${lvl}</span>`;
        const d = distTo(spot);
        const distLine = d != null ? `<div class="popup-row"><strong>距离：</strong>${d.toFixed(1)} km（${userPos.label}）</div>` : '';
        return `<div class="popup-card">
            <h3>${emoji} ${spot.name} ${badge}</h3>
            <div class="popup-row"><strong>地区：</strong>${spot.region}　<span class="badge ${spot.indoor==='indoor'?'badge-in':(spot.indoor==='outdoor'?'badge-out':'')}">${spot.indoor==='indoor'?'室内':(spot.indoor==='outdoor'?'室外':'室内/外')}</span></div>
            <div class="popup-row"><strong>票价：</strong>${spot.price||'—'}</div>
            ${spot.hours?`<div class="popup-row"><strong>时间：</strong>${spot.hours}</div>`:''}
            ${distLine}
            ${spot.phone?`<div class="popup-row"><strong>电话：</strong>${spot.phone}</div>`:''}
            ${spot.address?`<div class="popup-row"><strong>地址：</strong>${spot.address}</div>`:''}
            ${spot.free_policy?`<div class="popup-row"><strong>免票：</strong>${spot.free_policy}</div>`:''}
            <div class="popup-nav-row">
                <button class="popup-nav-btn nav-inapp" data-idx="${spots.indexOf(spot)}">🧭 App内导航</button>
                <a class="popup-nav nav-amap" target="_blank" href="https://uri.amap.com/marker?position=${spot.lng},${spot.lat}&name=${encodeURIComponent(spot.name)}&coordinate=gaode&callnative=0">高德网页</a>
            </div></div>`;
    }

    // ===== App 内导航（不跳出本页）=====
    let routeLine = null, amapLoading = false, pendingRoute = null;
    function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(1) + ' km' : Math.round(m) + ' m'; }
    function fmtTime(s) { const m = Math.round(s/60); return m >= 60 ? (Math.floor(m/60) + ' 小时 ' + (m%60) + ' 分') : (m + ' 分钟'); }
    function maneuverText(t) {
        return ({ 'depart':'出发', 'arrive':'到达', 'turn-left':'左转', 'turn-right':'右转', 'sharp-left':'急左转',
            'sharp-right':'急右转', 'slight-left':'微左转', 'slight-right':'微右转', 'straight':'直行',
            'merge':'并入', 'ramp':'上匝道', 'roundabout':'环岛', 'fork':'分叉', 'end-of-road':'尽头转弯' })[t] || '继续';
    }
    function setRouteStatus(msg) {
        const el = document.getElementById('route-summary');
        if (el) el.textContent = msg;
    }
    function setRouteError(msg) { setRouteStatus('⚠️ ' + msg); }
    function closeRoute() {
        if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
        document.getElementById('route-panel').style.display = 'none';
    }
    function drawRoute(coords, steps, engine, spot, origin, opts) {
        opts = opts || {};
        if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
        routeLine = L.polyline(coords, { color: opts.color || '#764ba2', weight: 5, opacity: 0.85 }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
        const td = steps.reduce((a, s) => a + (s.dist || 0), 0);
        const tt = steps.reduce((a, s) => a + (s.time || 0), 0);
        document.getElementById('route-title').textContent = '🧭 到 ' + spot.name;
        let summary = '<span>起点：' + origin.label + '</span><span>方式：' + (opts.modeLabel || engine) + '</span>'
            + '<span>总距：' + (td/1000).toFixed(1) + ' km</span><span>约 ' + Math.round(tt/60) + ' 分钟</span>';
        if (opts.taxi) summary += '<span>预估打车费 ≈ ' + estimateTaxiFare(td) + ' 元</span>';
        document.getElementById('route-summary').innerHTML = summary;
        document.getElementById('route-steps').innerHTML = steps.map((s, i) =>
            '<div class="route-step"><span class="rs-num">' + (i+1) + '</span><div>' +
            '<div class="rs-text">' + s.text + '</div>' +
            '<div class="rs-dist">' + fmtDist(s.dist || 0) + ' · ' + fmtTime(s.time || 0) + '</div></div></div>'
        ).join('');
        document.getElementById('route-panel').style.display = 'flex';
    }
    function routeWithAMap(o, d, spot, mode) {
        mode = mode || 'driving';
        const [olng, olat] = wgs84togcj02(o.lng, o.lat);
        const [dlng, dlat] = wgs84togcj02(d.lng, d.lat);
        const ep = (mode === 'walking') ? 'walking' : 'driving';   // taxi 复用 driving
        const url = 'https://restapi.amap.com/v3/direction/' + ep + '?key=' + AMAP_KEY
            + '&origin=' + olng + ',' + olat
            + '&destination=' + dlng + ',' + dlat
            + '&extensions=all' + (ep === 'driving' ? '&strategy=0' : '') + '&output=JSON';
        const isTaxi = (mode === 'taxi');
        const modeLabel = { driving:'驾车', walking:'步行', taxi:'的士' }[mode] || '驾车';
        jsonp(url).then(data => {
            if (data.status !== '1' || !data.route || !data.route.paths || !data.route.paths.length) {
                throw new Error(data.info || '高德无可用路线');
            }
            const path = data.route.paths[0];
            const coords = [], steps = [];
            path.steps.forEach(st => {
                (st.polyline || '').split(';').forEach(pair => {
                    if (!pair) return;
                    const pr = pair.split(','); const glng = +pr[0], glat = +pr[1];
                    const [wlat, wlng] = gcj02towgs84(glng, glat);
                    coords.push([wlat, wlng]);
                });
                steps.push({ text: st.instruction || '继续', dist: +st.distance || 0, time: +st.duration || 0 });
            });
            drawRoute(coords, steps, '高德', spot, o, { taxi: isTaxi, modeLabel });
        }).catch(err => {
            amapFailed = true; USE_AMAP = false;
            setRouteError('高德路线失败（' + err.message + '），已切换通用路线');
            routeWithOSRM(o, d, spot, mode);
        });
    }
    function routeWithOSRM(o, d, spot, mode) {
        mode = mode || 'driving';
        const isTaxi = (mode === 'taxi');
        const modeLabel = { driving:'驾车', walking:'步行', taxi:'的士' }[mode] || '驾车';
        const url = 'https://router.project-osrm.org/route/v1/driving/' + o.lng + ',' + o.lat + ';' +
                    d.lng + ',' + d.lat + '?geometries=geojson&overview=full&steps=true';
        fetch(url).then(r => r.json()).then(js => {
            if (!js.routes || !js.routes.length) throw new Error('无可用路线');
            const route = js.routes[0];
            const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
            const steps = (route.legs[0].steps || []).map(st => ({
                text: maneuverText(st.maneuver && st.maneuver.type) + (st.name ? '（' + st.name + '）' : ''),
                dist: st.distance, time: st.duration
            }));
            drawRoute(coords, steps, '通用(OSRM)', spot, o, { taxi: isTaxi, modeLabel });
        }).catch(err => setRouteError('路线计算失败：' + err.message));
    }
    function runRoute() {
        if (!pendingRoute) return;
        const { o, d, spot } = pendingRoute;
        if (USE_AMAP) routeWithAMap(o, d, spot, routeMode);
        else routeWithOSRM(o, d, spot, routeMode);
    }
    function startRoute(spot) {
        if (!spot) return;
        const o = userPos ? userPos : { lat: 40.0430, lng: 116.3330, label: '观林园(默认起点)' };
        const d = { lat: spot.lat, lng: spot.lng };
        pendingRoute = { o, d, spot };
        document.getElementById('route-panel').style.display = 'flex';
        document.getElementById('route-title').textContent = '🧭 规划到 ' + spot.name + '…';
        setRouteStatus('路线计算中，请稍候…');
        document.getElementById('route-steps').innerHTML = '';
        runRoute();
    }
    // 出行方式切换 + 弹出框「App内导航」按钮（事件委托）
    document.addEventListener('click', e => {
        const chip = e.target.closest && e.target.closest('.rmode');
        if (chip) {
            routeMode = chip.dataset.mode;
            document.querySelectorAll('.rmode').forEach(c => c.classList.toggle('active', c === chip));
            if (pendingRoute) { setRouteStatus('切换方式，重新计算中…'); runRoute(); }
            return;
        }
        const btn = e.target.closest && e.target.closest('.nav-inapp');
        if (!btn) return;
        const sp = spots[+btn.dataset.idx];
        if (sp) startRoute(sp);
    });

    // ===== 初始化 =====
    function init() {
        // ===== 区域两级筛选 =====
        const topEl = document.getElementById('region-top');
        const subEl = document.getElementById('region-sub');
        topEl.innerHTML = '<span class="chip active" data-top="all">全部</span>'
                        + '<span class="chip" data-top="beijing">北京</span>'
                        + '<span class="chip" data-top="other">其他</span>';
        function renderSubRegions(top) {
            let list = [];
            if (top === 'beijing') list = ALL_REGIONS.filter(r => isBeijingRegion(r));
            else if (top === 'other') list = OTHER_REGIONS;
            if (!list.length) { subEl.innerHTML = '<span class="chip-hint">选择上方区域查看细分</span>'; return; }
            subEl.innerHTML = '<span class="chip active" data-region="all">全部</span>'
                            + list.map(r => `<span class="chip" data-region="${r}">${r}</span>`).join('');
        }
        renderSubRegions('all');

        spots.forEach(s => {
            const m = createMarker(s);
            markers.push(m);
            if (cluster) cluster.addLayer(m); else m.addTo(map);
        });

        topEl.addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#region-top .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.regionTop = e.target.dataset.top;
            activeFilters.region = 'all';
            renderSubRegions(activeFilters.regionTop);
            applyFilters();
        });
        subEl.addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#region-sub .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.region = e.target.dataset.region;
            applyFilters();
        });
        document.getElementById('level-filters').addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#level-filters .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.level = e.target.dataset.level; applyFilters();
        });
        document.getElementById('price-filters').addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#price-filters .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.price = e.target.dataset.price; applyFilters();
        });
        // 景点类型筛选（来自单一数据源 SPOTS_CATEGORIES）
        const catEl = document.getElementById('category-filters');
        const cats = window.SPOTS_CATEGORIES || [];
        catEl.innerHTML = '<span class="chip active" data-category="all">全部</span>'
                        + cats.map(c => `<span class="chip" data-category="${c.key}">${c.emoji} ${c.label}</span>`).join('');
        catEl.addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#category-filters .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.category = e.target.dataset.category; applyFilters();
        });
        document.getElementById('indoor-filters').addEventListener('click', e => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('#indoor-filters .chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            activeFilters.indoor = e.target.dataset.indoor; applyFilters();
        });
        document.getElementById('search-box').addEventListener('input', e => {
            activeFilters.search = e.target.value.trim(); applyFilters();
        });
        document.getElementById('route-close').addEventListener('click', closeRoute);

        applyFilters();
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const btn = document.getElementById('toggle-sidebar');
        if (sb.style.display === 'none') {
            sb.style.display = 'flex'; btn.style.left = '310px';
            document.getElementById('map').style.left = '300px';
        } else {
            sb.style.display = 'none'; btn.style.left = '10px';
            document.getElementById('map').style.left = '0';
        }
        setTimeout(() => map.invalidateSize(), 200);
    }

    if (spots.length === 0) {
        document.getElementById('header-sub').textContent = '未加载到数据：请确认 spots-data.js 与本文件在同一目录';
    }
    init();

    // ===== PWA Service Worker 注册（可安装到主屏 / 离线缓存）=====
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
    </script>
</body>
